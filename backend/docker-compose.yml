services:
  redis:
    image: redis:7-alpine
    container_name: agent-skills-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - full  # 默认不启动，需要时使用 --profile full

  postgres:
    image: postgres:16-alpine
    container_name: agent-skills-postgres
    environment:
      POSTGRES_USER: agent_skills
      POSTGRES_PASSWORD: agent_skills_password
      POSTGRES_DB: agent_skills
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_skills"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_data:
